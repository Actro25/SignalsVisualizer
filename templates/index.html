<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uplot@1.6.30/dist/uPlot.min.css">
    <link rel="stylesheet" href="/css/index.css">
</head>
<body>
    <main>
        <div class="left-div">
            <div id="show" class="graphik-div"></div>
        </div>
        <div class='right-div'>
            <div class="right-upper-bar">
                <div class="new-row">
                    <button id="ws_connect">Connect</button>
                    <button id="ws_disconnect">Disconnect</button>
                    <button id="plot_pause">Pause</button>
                </div>

                <div class="new-row" style="align-items: flex-end; margin-top: 10px;">
                    <div class="range-container">
                        <label class="range-label" for="points-range">
                            <span>Points:</span>
                            <span id="quantity-range-value">1000</span>
                        </label>
                        <input type="range" class="styled-range" id="points-range" min="10" max="10000" step="10" value="1000">
                    </div>
                </div>

                <div class="new-row" style="align-items: flex-end; margin-top: 10px;">
                    <div class="range-container">
                        <label class="range-label" for="amplitude-range">
                            <span>Amplitude:</span>
                            <span id="amplitude-range-value">1</span>
                        </label>
                        <input type="range" class="styled-range" id="amplitude-range" min="0.01" max="10" step="0.01" value="1">
                    </div>
                </div>

                <div class="new-row" style="align-items: flex-end; margin-top: 10px;">
                    <div class="range-container">
                        <label class="range-label" for="frequency-range">
                            <span>Frequency:</span>
                            <span id="frequency-range-value">10</span>
                        </label>
                        <input type="range" class="styled-range" id="frequency-range" min="0.005" max="10" step="0.005" value="0.005">
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="/js/home.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/uplot@1.6.30/dist/uPlot.iife.min.js"></script>
</body>
</html>
